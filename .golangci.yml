version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck

    - unused
    - misspell
    - unparam
    - gosec
    - gocritic
    - bodyclose
    - contextcheck
    - nilerr
    - wrapcheck
    - err113
    - predeclared

  settings:
    gosec:
      excludes:
        - G104

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - wrapcheck
      - path: services/casino
        linters:
          - wrapcheck
      - path: services/movie-catalog
        linters:
          - wrapcheck

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
