services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./env/db.env
    environment:
      POSTGRES_DB: gallery
      POSTGRES_USER: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gallery"]
      interval: 5s
      timeout: 5s
      retries: 20

  casino-db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./env/db.env
    environment:
      POSTGRES_DB: mudro_casino
      POSTGRES_USER: postgres
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - casino_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mudro_casino"]
      interval: 5s
      timeout: 5s
      retries: 20

  casino-api:
    image: golang:1.24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "go run ./services/casino/cmd/casino"
    env_file:
      - ./env/casino.env
    depends_on:
      casino-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8082:8081"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/healthz | grep -q '\\\"status\\\":\\\"ok\\\"\\\\|\\\"status\\\": \\\"ok\\\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: redpandadata/redpanda:v24.3.6
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://kafka:9092"
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - kafka_prod:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:'"]
      interval: 10s
      timeout: 10s
      retries: 20

  api:
    image: golang:1.24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "go run ./cmd/api"
    env_file:
      - ./env/common.env
      - ./env/api.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      casino-db:
        condition: service_healthy
      casino-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz | grep -q '\\\"status\\\":\\\"ok\\\"\\\\|\\\"status\\\": \\\"ok\\\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  agent:
    image: golang:1.24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "go run ./cmd/agent --mode worker --interval 15s"
    env_file:
      - ./env/common.env
      - ./env/agent.env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[g]o run ./cmd/agent'"]
      interval: 20s
      timeout: 5s
      retries: 5

  reporter:
    image: golang:1.24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "go run ./cmd/reporter"
    env_file:
      - ./env/common.env
      - ./env/reporter.env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[g]o run ./cmd/reporter'"]
      interval: 30s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-06-22T05-26-45Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ./env/storage.env
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
  casino_pgdata_prod:
  redis_prod:
  kafka_prod:
  minio_prod:
