services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: gallery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for database superuser bootstrap}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gallery"]
      interval: 5s
      timeout: 5s
      retries: 20

  casino-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mudro_casino
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${CASINO_POSTGRES_PASSWORD:?CASINO_POSTGRES_PASSWORD is required for casino database superuser bootstrap}
    ports:
      - "127.0.0.1:${CASINO_POSTGRES_PORT:-5434}:5432"
    volumes:
      - casino_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mudro_casino"]
      interval: 5s
      timeout: 5s
      retries: 20

  casino-api:
    build:
      context: .
      args:
        SERVICE: services/casino/cmd/casino
    restart: unless-stopped
    environment:
      CASINO_ADDR: ":8081"
      CASINO_DSN: "${CASINO_APP_DSN:?CASINO_APP_DSN is required and must use a non-superuser casino app role}"
      CASINO_MAIN_DSN: "${MUDRO_APP_DSN:?MUDRO_APP_DSN is required and must use a non-superuser app role}"
      CASINO_INTERNAL_SECRET: "${CASINO_INTERNAL_SECRET:?CASINO_INTERNAL_SECRET is required}"
      CASINO_START_BALANCE: "${CASINO_START_BALANCE:-500}"
      CASINO_RTP_BPS: "${CASINO_RTP_BPS:-9500}"
      CASINO_MAX_BET: "${CASINO_MAX_BET:-1000}"
      CASINO_ROULETTE_BETTING_MS: "${CASINO_ROULETTE_BETTING_MS:-15000}"
      CASINO_ROULETTE_LOCK_MS: "${CASINO_ROULETTE_LOCK_MS:-1500}"
      CASINO_ROULETTE_SPIN_MS: "${CASINO_ROULETTE_SPIN_MS:-4500}"
      CASINO_ROULETTE_RESULT_MS: "${CASINO_ROULETTE_RESULT_MS:-3500}"
    depends_on:
      casino-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CASINO_API_PORT:-8082}:8081"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: redpandadata/redpanda:v24.3.6
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://kafka:9092"
    ports:
      - "127.0.0.1:${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_prod:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:'"]
      interval: 10s
      timeout: 10s
      retries: 20

  api:
    build:
      context: .
      args:
        SERVICE: services/feed-api/cmd
    restart: unless-stopped
    environment:
      API_ADDR: ":8080"
      DSN: "${MUDRO_APP_DSN:?MUDRO_APP_DSN is required and must use a non-superuser app role}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      MUDRO_ENV: "${MUDRO_ENV:-production}"
      API_RATE_LIMIT_RPS: "${API_RATE_LIMIT_RPS:-20}"
      API_RATE_LIMIT_BURST: "${API_RATE_LIMIT_BURST:-40}"
      API_ALLOWED_ORIGINS: "${API_ALLOWED_ORIGINS:-}"
      REDIS_RATE_LIMIT_ENABLED: "${REDIS_RATE_LIMIT_ENABLED:-false}"
      REDIS_ADDR: "${REDIS_ADDR:-redis:6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      CASINO_SERVICE_URL: "http://casino-api:8081"
      CASINO_INTERNAL_SECRET: "${CASINO_INTERNAL_SECRET:?CASINO_INTERNAL_SECRET is required}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      casino-db:
        condition: service_healthy
      casino-api:
        condition: service_started
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"

  agent:
    build:
      context: .
      args:
        SERVICE: services/agent/cmd
    restart: unless-stopped
    command: ["/service", "--mode", "worker", "--interval", "15s"]
    environment:
      DSN: "${MUDRO_APP_DSN:?MUDRO_APP_DSN is required and must use a non-superuser app role}"
      MUDRO_ENV: "${MUDRO_ENV:-production}"
      KAFKA_ENABLED: "${KAFKA_ENABLED:-false}"
      KAFKA_BROKERS: "${KAFKA_BROKERS:-kafka:9092}"
      KAFKA_TOPIC_TASKS: "${KAFKA_TOPIC_TASKS:-mudro.agent.tasks.v1}"
      KAFKA_CLIENT_ID: "${KAFKA_CLIENT_ID:-mudro-agent}"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
      kafka:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-06-22T05-26-45Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
  casino_pgdata_prod:
  redis_prod:
  kafka_prod:
  minio_prod:
