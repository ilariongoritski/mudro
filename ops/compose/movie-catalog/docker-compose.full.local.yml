services:
  postgres:
    image: postgres:16
    container_name: mudrotop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: movie_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_catalog"]
      interval: 5s
      timeout: 3s
      retries: 20

  movie-catalog:
    build:
      context: ../../
      dockerfile: services/movie-catalog/Dockerfile
    environment:
      MOVIE_CATALOG_ADDR: ":8091"
      MOVIE_CATALOG_DB_DSN: postgres://postgres:postgres@postgres:5432/movie_catalog?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8091:8091"

  frontend:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
    depends_on:
      - movie-catalog
    ports:
      - "5173:80"
