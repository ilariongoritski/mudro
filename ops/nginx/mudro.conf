server {
    listen 80;
    server_name mudro.yourdomain.com; # Replace with actual domain or leave as _ for IP matching

    # Redirect HTTP to HTTPS (uncomment when SSL is installed via Certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000; # Assuming Vercel is used remotely, if local frontend: 127.0.0.1:3000
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy MinIO S3 media files
    location /media/ {
        # proxy_pass http://127.0.0.1:9000/media/;
        # If using local media folder without minio proxy:
        alias /app/data/nu/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy MinIO Console 
    location /minio/ui/ {
        proxy_pass http://127.0.0.1:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
