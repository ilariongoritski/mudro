services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gallery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gallery"]
      interval: 2s
      timeout: 5s
      retries: 20

  casino-db:
    image: postgres:16
    environment:
      POSTGRES_DB: mudro_casino
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${CASINO_POSTGRES_PORT:-5434}:5432"
    volumes:
      - casino_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mudro_casino"]
      interval: 2s
      timeout: 5s
      retries: 20

  casino-api:
    image: golang:1.24
    working_dir: /app
    command: sh -c "go run ./services/casino/cmd/casino"
    environment:
      CASINO_ADDR: ":8081"
      CASINO_DSN: "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@casino-db:5432/mudro_casino?sslmode=disable"
      CASINO_INITIAL_COINS: "${CASINO_INITIAL_COINS:-2500}"
      CASINO_RTP_BPS: "${CASINO_RTP_BPS:-9500}"
      CASINO_MAX_BET: "${CASINO_MAX_BET:-1000}"
    depends_on:
      casino-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CASINO_API_PORT:-8081}:8081"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/healthz | grep -q '\"status\":\"ok\"\\|\"status\": \"ok\"'"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  casino_pgdata:
