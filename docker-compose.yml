# Deprecated local file.
# Canonical dev stacks live in ops/compose/.
# Canonical release stack lives in docker-compose.prod.yml.
version: '3.8'
services:
  postgres_main:
    image: postgres:15
    environment:
      POSTGRES_USER: mudro
      POSTGRES_PASSWORD: mudropass
      POSTGRES_DB: mudro_main
    ports:
      - "5432:5432"
    volumes:
      - ./db/main:/var/lib/postgresql/data

  postgres_casino:
    image: postgres:15
    environment:
      POSTGRES_USER: mudro
      POSTGRES_PASSWORD: mudropass
      POSTGRES_DB: mudro_casino
    ports:
      - "5433:5432"
    volumes:
      - ./db/casino:/var/lib/postgresql/data
