version: 1
updated_at: "2026-03-23"

runtime:
  active:
    - name: feed-api
      path: services/feed-api/cmd
      run: go run ./services/feed-api/cmd
      env_files: [env/common.env, env/api.env]
    - name: casino
      path: services/casino/cmd/casino
      run: go run ./services/casino/cmd/casino
      env_files: [env/common.env, env/casino.env]
    - name: agent
      path: services/agent/cmd
      run: go run ./services/agent/cmd
      env_files: [env/common.env, env/agent.env]
    - name: bot
      path: services/bot/cmd
      run: go run ./services/bot/cmd
      env_files: [env/common.env, env/bot.env]
  bootstrap:
    - name: api-gateway
      path: services/api-gateway/cmd
      run: go run ./services/api-gateway/cmd
      env_files: [env/gateway.env]
    - name: bff-web
      path: services/bff-web/cmd
      run: go run ./services/bff-web/cmd
      env_files: [env/bff-web.env]
    - name: auth-api
      path: services/auth-api/cmd
      run: go run ./services/auth-api/cmd
      env_files: [env/common.env, env/api.env]
    - name: orchestration-api
      path: services/orchestration-api/cmd
      run: go run ./services/orchestration-api/cmd
      env_files: [env/common.env, env/api.env]
  legacy:
    - name: reporter-old
      path: legacy/old/services/reporter-old/cmd
      run: go run ./legacy/old/services/reporter-old/cmd
      status: "Old (not used by default)"
      env_files: [env/common.env, env/reporter.env]

cli:
  importers_root: tools/importers
  backfill_root: tools/backfill
  maintenance_root: tools/maintenance

compose:
  core: ops/compose/docker-compose.core.yml
  services: ops/compose/docker-compose.services.yml
  legacy: ops/compose/docker-compose.legacy.yml
