name: Mudro CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Vet backend targets
        run: go vet ./services/... ./tools/... ./cmd/... ./pkg/...

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Build backend targets
        run: go build ./services/... ./tools/... ./cmd/...

  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check migration up lists
        run: make check-migration-up-list

  backend-unit:
    name: Backend Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Run backend unit tests
        run: go test -short ./...

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      MUDRO_INTEGRATION_TEST_DSN: postgres://postgres:postgres@127.0.0.1:5432/mudro_ci?sslmode=disable
      MUDRO_CASINO_INTEGRATION_TEST_DSN: postgres://postgres:postgres@127.0.0.1:5432/mudro_casino_ci?sslmode=disable
      MUDRO_E2E_TEST_DSN: postgres://postgres:postgres@127.0.0.1:5432/mudro_ci?sslmode=disable
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create isolated integration databases
        run: |
          createdb mudro_ci
          createdb mudro_casino_ci

      - name: Apply feed database migrations
        run: |
          set -euo pipefail
          for f in $(make -s migrate-list); do
            psql "$MUDRO_INTEGRATION_TEST_DSN" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply casino database migrations
        run: |
          set -euo pipefail
          for f in $(bash ./scripts/migrate-casino.sh --list); do
            psql "$MUDRO_CASINO_INTEGRATION_TEST_DSN" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run feed integration tests
        run: go test -run Integration -v ./services/feed-api/internal/feed

      - name: Run casino integration tests
        run: go test -run Integration -v ./services/casino/internal/casino

      - name: Run e2e smoke tests
        run: go test -v ./e2e

  release-smoke:
    name: Release Compose & Docker Smoke
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres
      CASINO_POSTGRES_PASSWORD: ci-casino-postgres
      MUDRO_APP_DSN: postgres://mudro_app:ci@db:5432/gallery?sslmode=disable
      CASINO_APP_DSN: postgres://mudro_casino_app:ci@casino-db:5432/mudro_casino?sslmode=disable
      JWT_SECRET: ci-jwt-secret
      CASINO_INTERNAL_SECRET: ci-casino-internal-secret
      MINIO_ROOT_USER: minio-ci
      MINIO_ROOT_PASSWORD: minio-ci-password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config

      - name: Build feed API production image
        run: docker build --build-arg SERVICE=services/feed-api/cmd -t mudro-feed-api:ci .

      - name: Build casino API production image
        run: docker build --build-arg SERVICE=services/casino/cmd/casino -t mudro-casino-api:ci .

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Validate HTTP contracts
        run: go run ./tools/validate-contracts -dir contracts

  frontend:
    name: Frontend Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint Frontend
        run: cd frontend && npm run lint

      - name: Test Frontend
        run: cd frontend && npm run test

      - name: Build Frontend
        run: cd frontend && npm run build

  frontend-e2e:
    name: Frontend Playwright Smoke
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Build Frontend
        run: cd frontend && npm run build

      - name: Run Playwright smoke
        run: cd frontend && npm run e2e
