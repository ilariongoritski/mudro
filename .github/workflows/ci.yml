name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run Unit/Integration Tests
        run: go test ./...

  smoke-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gallery
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gallery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run Migrations
        env:
          PGPASSWORD: postgres
        run: psql "postgres://postgres:postgres@localhost:5433/gallery?sslmode=disable" -v ON_ERROR_STOP=1 -f migrations/001_init.sql

      - name: Run Smoke E2E
        run: go test ./e2e -v
