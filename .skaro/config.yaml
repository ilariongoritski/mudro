import:
  max_file_size: 100000
  token_limit: 200000
lang: ru
llm:
  api_key_env: ANTHROPIC_API_KEY
  base_url: https://claude-api.filips-site.online
  max_tokens: 16384
  model: claude-sonnet-4.6
  provider: anthropic
  temperature: 0.2
project_description: Unified VK + Telegram feed platform with Go backend, PostgreSQL, React frontend, importers, bots, and local/VPS ops workflows.
project_name: MUDRO
roles:
  architect:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://claude-api.filips-site.online
    max_tokens: 24000
    model: claude-opus-4.6
    provider: anthropic
    temperature: 0.15
  coder:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://claude-api.filips-site.online
    max_tokens: 24000
    model: claude-opus-4.6
    provider: anthropic
    temperature: 0.1
  reviewer:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://claude-api.filips-site.online
    max_tokens: 16000
    model: claude-opus-4.6
    provider: anthropic
    temperature: 0.1
theme: dark
ui:
  auto_open_browser: true
verify_commands:
- command: wsl bash -lc "cd /mnt/e/mudr/mudro11-reference-reference && make dbcheck"
  name: dbcheck
- command: wsl bash -lc "cd /mnt/e/mudr/mudro11-reference-reference && make tables"
  name: tables
- command: wsl bash -lc "cd /mnt/e/mudr/mudro11-reference-reference && go test $(go list ./... | grep -v '/tmp$')"
  name: go-test
- command: npm.cmd --prefix frontend run build
  name: frontend-build
- command: npm.cmd --prefix frontend run lint
  name: frontend-lint

