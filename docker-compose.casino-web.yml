services:
  casino-web:
    build:
      context: /opt/mudro/services/casino-web
      dockerfile: Dockerfile
    image: mudro-casino-web:latest
    container_name: mudro-casino-web-1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_CASINO_API_URL: "http://mudro-casino-api-1:8081"
      NEXT_PUBLIC_AUTH_API_URL: "http://mudro-auth-api-1:8080"
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - mudro_default
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  mudro_default:
    external: true
