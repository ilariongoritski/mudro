version: '3.8'

services:
  casino-web:
    build:
      context: /opt/mudro/services/casino-web
      dockerfile: Dockerfile
    image: mudro-casino-web:latest
    container_name: mudro-casino-web-1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_CASINO_API_URL:  http://mudro-casino-api-1:8081
      NEXT_PUBLIC_AUTH_API_URL: http://mudro-auth-api-1:8080
    depends_on:
      - mudro-casino-api-1
    ports:
      - 127.0.0.1:3002:3000
    networks:
      - mudro
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://localhost:3000]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  mudro:
    external: true
