openapi: 3.0.3
info:
  title: MUDRO Auth API
  version: 1.1.0
  description: |
    Authentication and user management service.
    JWT tokens are issued as HS256, expiry configurable via JWT_EXPIRY_HOURS (default 168h / 7 days).
servers:
  - url: http://localhost:8087
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      required: [id, username, role, is_premium]
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        is_premium:
          type: boolean

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Signed JWT
        user:
          $ref: '#/components/schemas/User'

    ErrorResponse:
      type: string
      description: Plain-text error message

paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthz
      responses:
        "200":
          description: Service is healthy

  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        "201":
          description: Registered and logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        "400":
          description: Validation error
        "409":
          description: Username or email already taken

  /api/v1/auth/login:
    post:
      summary: Log in with credentials
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                login:
                  type: string
                  description: Username or email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        "401":
          description: Invalid credentials

  /api/v1/auth/refresh:
    post:
      summary: Refresh JWT token
      operationId: refreshToken
      description: |
        Issues a new JWT using the current (still valid) token.
        Call before expiry to keep the session alive without re-authenticating.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        "401":
          description: Token missing or expired

  /api/v1/auth/me:
    get:
      summary: Get current user
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Unauthorized

  /api/v1/auth/logout:
    post:
      summary: Logout (client clears token)
      operationId: logout
      description: Stateless JWT — server returns 200, client must clear the stored token.
      responses:
        "200":
          description: OK

  /api/v1/auth/telegram:
    post:
      summary: Authenticate via Telegram WebApp
      operationId: telegramAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [initData]
              properties:
                initData:
                  type: string
                  description: Raw initData string from Telegram WebApp
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        "401":
          description: Invalid or expired Telegram session

  /api/v1/admin/users:
    get:
      summary: List all users (admin only)
      operationId: adminListUsers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
        "403":
          description: Admin access required

  /api/v1/admin/stats:
    get:
      summary: System statistics (admin only)
      operationId: adminGetStats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats payload
        "403":
          description: Admin access required
