openapi: 3.0.3
info:
  title: MUDRO Casino Service API
  version: 1.1.0
  description: Direct casino microservice contract. Feed API exposes these routes through /api/casino/* proxy paths.
servers:
  - url: http://localhost:8081
    description: Local casino service

components:
  securitySchemes:
    internalSecret:
      type: apiKey
      in: header
      name: X-Internal-Secret
  parameters:
    UserID:
      in: header
      name: X-User-ID
      required: true
      schema:
        type: integer
        format: int64
    UserName:
      in: header
      name: X-User-Name
      schema:
        type: string
    UserRole:
      in: header
      name: X-User-Role
      schema:
        type: string
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 20
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    Balance:
      type: object
      properties:
        balance:
          type: integer
          format: int64
        free_spins_balance:
          type: integer
        bonus_claimed:
          type: boolean
        rtp:
          type: integer
        currency:
          type: string
    Bet:
      type: object
      properties:
        bet:
          type: integer
          format: int64
    Status:
      type: object
      properties:
        status:
          type: string

security:
  - internalSecret: []

paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
        "503":
          description: Database unavailable

  /balance:
    get:
      summary: Current wallet balance
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/UserName'
        - $ref: '#/components/parameters/UserRole'
      responses:
        "200":
          description: Balance payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Balance'
        "401":
          description: Unauthorized

  /history:
    get:
      summary: Slot spin history
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: History list
        "401":
          description: Unauthorized

  /spin:
    post:
      summary: Place slot bet and spin
      parameters:
        - $ref: '#/components/parameters/UserID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bet'
      responses:
        "200":
          description: Spin result
        "401":
          description: Unauthorized
        "409":
          description: Insufficient balance

  /config:
    get:
      summary: Read casino config
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/UserRole'
      responses:
        "200":
          description: Config
        "403":
          description: Admin only
    put:
      summary: Update casino config
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/UserRole'
      responses:
        "200":
          description: Updated
        "403":
          description: Admin only

  /profile:
    get:
      summary: Player profile
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Profile payload
        "401":
          description: Unauthorized

  /activity:
    get:
      summary: Current user's casino activity
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Activity list
        "401":
          description: Unauthorized

  /live-feed:
    get:
      summary: Global casino live feed
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Live feed
        "401":
          description: Unauthorized

  /top-wins:
    get:
      summary: Top casino wins
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Top wins
        "401":
          description: Unauthorized

  /reactions:
    get:
      summary: Casino activity reactions
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Reaction list
    post:
      summary: Add casino activity reaction
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Reaction item

  /bonus/state:
    get:
      summary: Bonus state
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Bonus state

  /bonus/claim-subscription:
    post:
      summary: Claim subscription bonus
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Claim result
        "412":
          description: Verification required

  /bonus/history:
    get:
      summary: Bonus claim history
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Bonus claim list

  /roulette/state:
    get:
      summary: Current roulette state
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Roulette state

  /roulette/bets:
    post:
      summary: Place roulette bets
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Bet placement result

  /roulette/instant-spin:
    post:
      summary: Place instant roulette bets
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Instant spin result

  /roulette/history:
    get:
      summary: Roulette history
      parameters:
        - $ref: '#/components/parameters/UserID'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Roulette history

  /roulette/stream:
    get:
      summary: Roulette server-sent events stream
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Server-sent events stream

  /plinko/config:
    get:
      summary: Plinko config
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Plinko config

  /plinko/state:
    get:
      summary: Plinko state
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Plinko state

  /plinko/drop:
    post:
      summary: Drop a plinko ball
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Plinko result

  /blackjack/state:
    get:
      summary: Blackjack state
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Blackjack state

  /blackjack/start:
    post:
      summary: Start blackjack game
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Blackjack state

  /blackjack/action:
    post:
      summary: Apply blackjack action
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Blackjack state

  /fairness/rotate-server-seed:
    post:
      summary: Rotate current user's server seed
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: New server seed hash

  /fairness/client-seed:
    post:
      summary: Update current user's client seed
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        "200":
          description: Updated
