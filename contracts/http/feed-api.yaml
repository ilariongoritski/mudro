openapi: 3.0.3
info:
  title: MUDRO Feed API Contract
  version: 1.1.0
servers:
  - url: http://localhost:8080
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /api/front:
    get:
      summary: Front page aggregated payload
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated front payload
  /api/posts:
    get:
      summary: Feed items list
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: before_ts
          schema:
            type: string
        - in: query
          name: before_id
          schema:
            type: integer
      responses:
        "200":
          description: Posts payload

  /api/auth/login:
    post:
      summary: Login (feed-api local proxy)
      operationId: feedAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                login:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token and user
        "401":
          description: Invalid credentials

  /api/auth/register:
    post:
      summary: Register (feed-api local proxy)
      operationId: feedAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  minLength: 6
      responses:
        "201":
          description: Registered and logged in
        "409":
          description: Username or email already taken

  /api/auth/me:
    get:
      summary: Get current user (feed-api local proxy)
      operationId: feedAuthMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
        "401":
          description: Unauthorized

  /api/chat/ws:
    get:
      summary: WebSocket — real-time chat
      operationId: chatWS
      description: |
        Upgrade to WebSocket. Authenticate via ?token=<jwt> query param
        (browser WS API does not support custom headers).
        Server sends JSON events: {"type":"message","message":{...}}
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
        - in: query
          name: room
          schema:
            type: string
            default: main
      responses:
        "101":
          description: Switching Protocols
        "401":
          description: Unauthorized

  /api/chat/history:
    get:
      summary: Chat message history
      operationId: chatHistory
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: room
          schema:
            type: string
            default: main
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        room:
                          type: string
                        body:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            username:
                              type: string
                            role:
                              type: string
        "401":
          description: Unauthorized
